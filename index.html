<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Forest - Seu Gestor de Tarefas</title>
    <title>Kanban Forest - Seu Gestor de Tarefas</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary:    #EBE2D4;   /* Creme Escuro Médio - Ajustado */
            --bg-secondary:  #FAFAF7;   /* Branco suave */
            --bg-card:       #FFFFFF;   /* Puro branco nos cards para saltar da tela */
            --border-card:   #C8BAA6;   /* Borda definida */
            --accent-green:  #2D6A4F;   /* Verde Floresta */
            --accent-light:  #52B788;   /* Verde médio */
            --accent-cream:  #E9DCC9;   /* Creme escuro */
            --danger:        #C0392B;   /* Vermelho */
            --text-primary:  #1A1A1A;
            --text-secondary:#6B6B6B;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-card: 0 1px 4px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg-primary:    #121212;
            --bg-secondary:  #1A1A1A;   /* Um pouco mais escuro para as colunas */
            --bg-card:       #2A2A2A;   /* Mais claro para os cards destacadas */
            --border-card:   #3A3A3A;
            --text-primary:  #E0E0E0;
            --text-secondary:#A0A0A0;
            --accent-cream:  #333333;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-card: 0 1px 4px rgba(0,0,0,0.2);
            --accent-green:  #40916C;
        }

        /* --- DROPDOWN --- */
        .user-dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 10px;
            background-color: var(--bg-secondary);
            min-width: 160px;
            box-shadow: var(--shadow);
            z-index: 1000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--accent-cream);
        }

        .dropdown-content.show {
            display: flex;
            flex-direction: column;
        }

        .dropdown-content button {
            background: transparent;
            border: none;
            padding: 12px 16px;
            text-align: left;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 0.875rem;
            transition: var(--transition);
            width: 100%;
        }

        .dropdown-content button:hover {
            background-color: rgba(45, 106, 79, 0.1);
        }

        /* --- TABS --- */
        .tab-btn {
            background: transparent;
            border: 1px solid var(--accent-cream);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-primary);
            transition: var(--transition);
        }
        .tab-btn.active {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- AUTH SCREENS --- */
        #auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--accent-cream);
        }

        .auth-card h2 {
            margin-bottom: 24px;
            color: var(--accent-green);
            text-align: center;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--accent-cream);
            border-radius: 8px;
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--accent-green);
            color: white;
        }

        .btn-primary:hover {
            background-color: #1b4332;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
        }

        .btn-outline:hover {
            background: rgba(45, 106, 79, 0.05);
        }

        .auth-toggle {
            margin-top: 20px;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .auth-toggle span {
            color: var(--accent-green);
            cursor: pointer;
            font-weight: 600;
        }

        /* --- APP HEADER --- */
        header {
            background-color: var(--accent-green);
            color: white;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info span {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        #logout-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 6px 12px;
            font-size: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: var(--transition);
        }

        #logout-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* --- DASHBOARD --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            width: 100%;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .metric-card {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--accent-cream);
            text-align: center;
        }

        .metric-card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .metric-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .metric-card.danger .value {
            color: var(--danger);
        }

        .metric-card.danger {
            border-left: 4px solid var(--danger);
        }

        /* --- KANBAN BOARD --- */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            align-items: flex-start;
        }

        .column {
            background: rgba(233, 220, 201, 0.3);
            border-radius: 12px;
            padding: 16px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border: 1px dashed var(--accent-cream);
            transition: var(--transition);
        }

        .column.drag-over {
            background: rgba(82, 183, 136, 0.1);
            border-color: var(--accent-light);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .column-header h2 {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .add-task-btn {
            background: transparent;
            border: none;
            color: var(--accent-green);
            cursor: pointer;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            border-radius: 50%;
            width: 24px;
            height: 24px;
        }

        .add-task-btn:hover {
            background: rgba(45, 106, 79, 0.1);
        }

        /* --- CARDS --- */
        .card {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            cursor: grab;
            user-select: none;
            border: 1px solid var(--border-card);
            transition: var(--transition);
            position: relative;
        }

        .card:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .card.dragging {
            opacity: 0.4;
            cursor: grabbing;
        }

        .card h4 {
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .card p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .badge {
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            background: var(--accent-cream);
            color: var(--text-secondary);
        }

        .badge.overdue {
            background: var(--danger);
            color: white;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.6;
            transition: var(--transition);
        }

        .action-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .btn-done { color: var(--accent-light); }
        .btn-edit { color: #3498DB; }
        .btn-delete { color: var(--danger); }

        .card.is-done {
            border-left: 4px solid var(--accent-light);
        }
        .card.is-overdue {
            border: 1px solid var(--danger);
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: var(--bg-secondary);
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--accent-cream);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 1.25rem;
            color: var(--accent-green);
        }

        .close-modal {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .board {
                grid-template-columns: 1fr;
            }
            .column {
                min-height: auto;
            }
        }

        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Autenticação -->
    <div id="auth-container">
        <div class="auth-card" id="login-form">
            <h2>Kanban Forest</h2>
            <form id="f-login">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="l-user" placeholder="Seu nome de usuário" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="l-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>
            <div class="auth-toggle">
                Não tem conta? <span onclick="toggleAuth()">Cadastre-se</span>
            </div>
        </div>

        <div class="auth-card hidden" id="register-form">
            <h2>Nova Conta</h2>
            <form id="f-register">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="r-user" placeholder="Escolha um nome" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="r-pass" placeholder="Senha forte" required>
                </div>
                <button type="submit" class="btn btn-primary">Criar Conta</button>
            </form>
            <div class="auth-toggle">
                Já tem conta? <span onclick="toggleAuth()">Fazer Login</span>
            </div>
        </div>
    </div>

    <!-- App Principal -->
    <div id="app-container" class="hidden">
        <header>
            <h1>Kanban Forest</h1>
            <div class="user-info">
                <div class="user-dropdown">
                    <span id="user-display" onclick="toggleDropdown()" style="cursor:pointer; border-bottom: 1px dashed rgba(255,255,255,0.5); padding-bottom: 2px;">Usuário</span>
                    <div id="user-dropdown-menu" class="dropdown-content">
                        <button onclick="openSettingsModal()">Configurações</button>
                        <button onclick="toggleTheme()" id="theme-toggle-btn">Tema Escuro</button>
                    </div>
                </div>
                <button id="logout-btn">Sair</button>
            </div>
        </header>

        <main class="container">
            <div class="dashboard-grid">
                <div class="metric-card">
                    <h3>Total</h3>
                    <div class="value" id="m-total">0</div>
                </div>
                <div class="metric-card">
                    <h3>Em Execução</h3>
                    <div class="value" id="m-doing">0</div>
                </div>
                <div class="metric-card">
                    <h3>Concluídas</h3>
                    <div class="value" id="m-done">0</div>
                </div>
                <div class="metric-card" id="card-overdue">
                    <h3>Em Atraso</h3>
                    <div class="value" id="m-overdue">0</div>
                </div>
            </div>

            <div class="board">
                <div class="column" id="col-todo" data-status="todo" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <div class="column-header">
                        <h2>A Fazer</h2>
                        <button class="add-task-btn" onclick="openModal('todo')">+</button>
                    </div>
                    <div class="task-list" id="list-todo"></div>
                </div>
                <div class="column" id="col-doing" data-status="doing" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <div class="column-header">
                        <h2>Fazendo</h2>
                    </div>
                    <div class="task-list" id="list-doing"></div>
                </div>
                <div class="column" id="col-done" data-status="done" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                    <div class="column-header">
                        <h2>Concluído</h2>
                    </div>
                    <div class="task-list" id="list-done"></div>
                </div>
            </div>

            <div class="chart-container" style="margin-top: 40px; background: var(--bg-secondary); padding: 20px; border-radius: 12px; border: 1px solid var(--accent-cream); box-shadow: var(--shadow-card); display: flex; justify-content: center; align-items: center;">
                <div style="width: 100%; max-width: 400px;">
                    <canvas id="dashboardChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Tarefa -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Nova Tarefa</h2>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <input type="hidden" id="task-status">
                <div class="form-group">
                    <label>Título*</label>
                    <input type="text" id="t-title" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="t-desc" rows="3" style="width:100%; padding:12px; border:1px solid var(--accent-cream); border-radius:8px; outline:none; font-family:inherit;"></textarea>
                </div>
                <div class="form-group">
                    <label>Prazo (Deadline)</label>
                    <input type="date" id="t-deadline">
                </div>
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Configurações -->
    <div class="modal-overlay" id="settings-modal" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h2 id="settings-modal-title">Configurações</h2>
                <button class="close-modal" onclick="closeSettingsModal()">&times;</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button type="button" class="tab-btn active" onclick="switchTab('contato')">📧 Contato</button>
                <button type="button" class="tab-btn" onclick="switchTab('seguranca')">🔒 Segurança</button>
            </div>

            <form id="settings-form">
                <div id="tab-contato" class="tab-content">
                    <div class="form-group">
                        <label>📧 E-mail</label>
                        <input type="email" id="s-email" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label>📞 Telefone</label>
                        <input type="tel" id="s-phone" placeholder="(00) 00000-0000">
                    </div>
                </div>

                <div id="tab-seguranca" class="tab-content" style="display:none;">
                    <div class="form-group">
                        <label>Senha Atual</label>
                        <input type="password" id="s-pass-current" placeholder="Digite sua senha atual">
                    </div>
                    <div class="form-group">
                        <label>Nova Senha</label>
                        <input type="password" id="s-pass" placeholder="Deixe em branco para manter a atual">
                    </div>
                    <div class="form-group">
                        <label>Confirmar Nova Senha</label>
                        <input type="password" id="s-pass-confirm" placeholder="Confirme a nova senha">
                    </div>
                </div>

                <div style="display:flex; gap:12px; margin-top:20px;">
                    <button type="button" class="btn btn-outline" onclick="closeSettingsModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Perfil</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';
        let tasks = [];
        let currentUser = null;
        let dashboardChart = null;

        // Theme Initialization
        const savedTheme = localStorage.getItem('kanban_theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // --- AUTH LOGIC ---
        function toggleAuth() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        }

        document.getElementById('f-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('r-user').value;
            const password = document.getElementById('r-pass').value;
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Usuário criado! Faça login.');
                    toggleAuth();
                } else alert(data.error);
            } catch (err) { alert('Erro ao registrar'); }
        });

        document.getElementById('f-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('l-user').value;
            const password = document.getElementById('l-pass').value;
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('kanban_token', data.token);
                    localStorage.setItem('kanban_user', data.username);
                    initApp();
                } else alert(data.error);
            } catch (err) { alert('Erro ao fazer login'); }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('kanban_token');
            localStorage.removeItem('kanban_user');
            window.location.reload();
        });

        // --- APP LOGIC ---
        async function initApp() {
            const token = localStorage.getItem('kanban_token');
            if (!token) {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
                return;
            }

            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-display').innerText = localStorage.getItem('kanban_user');

            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('theme-toggle-btn').innerText = isDark ? 'Tema Claro' : 'Tema Escuro';
            
            await fetchProfile();
            await fetchTasks();
            renderBoard();
        }

        async function fetchTasks() {
            const token = localStorage.getItem('kanban_token');
            const res = await fetch(`${API_URL}/tasks`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401 || res.status === 403) return logout();
            tasks = await res.json();
        }

        function renderBoard() {
            const lists = {
                todo: document.getElementById('list-todo'),
                doing: document.getElementById('list-doing'),
                done: document.getElementById('list-done')
            };

            Object.values(lists).forEach(l => l.innerHTML = '');

            let metrics = { total: tasks.length, doing: 0, done: 0, overdue: 0 };
            const today = new Date().toISOString().split('T')[0];

            tasks.forEach(task => {
                const isOverdue = task.deadline && task.deadline < today && task.status !== 'done' && !task.completedAt;
                if (task.status === 'doing') metrics.doing++;
                if (task.completedAt) metrics.done++;
                if (isOverdue) metrics.overdue++;

                const card = document.createElement('div');
                card.className = `card ${task.completedAt ? 'is-done' : ''} ${isOverdue ? 'is-overdue' : ''}`;
                card.draggable = true;
                card.id = `task-${task.id}`;
                card.ondragstart = drag;
                
                card.innerHTML = `
                    <h4>${task.title}</h4>
                    <p>${task.description || 'Sem descrição'}</p>
                    <div class="card-footer">
                        <span class="badge ${isOverdue ? 'overdue' : ''}">
                            ${isOverdue ? 'Em atraso' : (task.deadline ? 'Prazo: ' + formatDate(task.deadline) : 'Sem prazo')}
                        </span>
                        <div class="card-actions">
                            <button class="action-btn btn-done" onclick="toggleDone('${task.id}')" title="Concluir">✓</button>
                            <button class="action-btn btn-edit" onclick="openModal('${task.status}', '${task.id}')" title="Editar">✏️</button>
                            <button class="action-btn btn-delete" onclick="deleteTask('${task.id}')" title="Excluir">🗑️</button>
                        </div>
                    </div>
                `;
                
                if (lists[task.status]) lists[task.status].appendChild(card);
            });

            document.getElementById('m-total').innerText = metrics.total;
            document.getElementById('m-doing').innerText = metrics.doing;
            document.getElementById('m-done').innerText = metrics.done;
            document.getElementById('m-overdue').innerText = metrics.overdue;
            
            const overdueCard = document.getElementById('card-overdue');
            if (metrics.overdue > 0) overdueCard.classList.add('danger');
            else overdueCard.classList.remove('danger');
            
            renderChart({ todo: tasks.length - (metrics.doing + metrics.done), doing: metrics.doing, done: metrics.done });
        }

        function renderChart(data) {
            const ctx = document.getElementById('dashboardChart').getContext('2d');
            const isDark = document.body.classList.contains('dark-mode');
            const textColor = isDark ? '#E0E0E0' : '#1A1A1A';

            if (dashboardChart) {
                dashboardChart.data.datasets[0].data = [data.todo, data.doing, data.done];
                dashboardChart.options.plugins.legend.labels.color = textColor;
                dashboardChart.update();
            } else {
                dashboardChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['A Fazer', 'Fazendo', 'Concluído'],
                        datasets: [{
                            data: [data.todo, data.doing, data.done],
                            backgroundColor: ['#D0B8A1', '#52B788', '#2D6A4F'],
                            borderWidth: 1,
                            borderColor: isDark ? '#1E1E1E' : '#FFFFFF'
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { color: textColor }
                            }
                        }
                    }
                });
            }
        }

        // --- PROFILE LOGIC ---
        async function fetchProfile() {
            const token = localStorage.getItem('kanban_token');
            try {
                const res = await fetch(`${API_URL}/auth/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const profile = await res.json();
                    document.getElementById('user-display').innerText = profile.displayName + ' ▼';
                    document.getElementById('s-email').value = profile.email || '';
                    document.getElementById('s-phone').value = profile.phone || '';
                }
            } catch (err) { console.error('Erro ao ler perfil'); }
        }

        function toggleDropdown() {
            document.getElementById('user-dropdown-menu').classList.toggle('show');
        }

        window.onclick = function(event) {
            if (!event.target.matches('#user-display')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('kanban_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-toggle-btn').innerText = isDark ? 'Tema Claro' : 'Tema Escuro';
            
            if (dashboardChart) {
                dashboardChart.options.plugins.legend.labels.color = isDark ? '#E0E0E0' : '#1A1A1A';
                dashboardChart.data.datasets[0].borderColor = isDark ? '#1E1E1E' : '#FFFFFF';
                dashboardChart.update();
            }
        }

        function switchTab(tab) {
            document.getElementById('tab-contato').style.display = tab === 'contato' ? 'block' : 'none';
            document.getElementById('tab-seguranca').style.display = tab === 'seguranca' ? 'block' : 'none';
            
            const btns = document.querySelectorAll('.tab-btn');
            btns[0].classList.toggle('active', tab === 'contato');
            btns[1].classList.toggle('active', tab === 'seguranca');
        }

        function openSettingsModal() {
            document.getElementById('settings-modal').style.display = 'flex';
            document.getElementById('user-dropdown-menu').classList.remove('show');
        }

        function closeSettingsModal() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        document.getElementById('settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('kanban_token');
            const currentPass = document.getElementById('s-pass-current').value;
            const pass = document.getElementById('s-pass').value;
            const passConfirm = document.getElementById('s-pass-confirm').value;

            if (pass || currentPass) {
                if (pass !== passConfirm) {
                    alert('As senhas novas não coincidem!');
                    return;
                }
                if (!currentPass) {
                    alert('Por favor, informe sua senha atual para alterar a senha.');
                    return;
                }
            }

            const payload = {
                email: document.getElementById('s-email').value,
                phone: document.getElementById('s-phone').value,
                currentPassword: currentPass,
                password: pass
            };

            const res = await fetch(`${API_URL}/auth/profile`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                closeSettingsModal();
                document.getElementById('s-pass-current').value = '';
                document.getElementById('s-pass').value = '';
                document.getElementById('s-pass-confirm').value = '';
                await fetchProfile();
                alert('Perfil atualizado com sucesso!');
            } else {
                const data = await res.json();
                alert(data.error || 'Erro ao atualizar perfil.');
            }
        });

        // --- TASK OPERATIONS ---
        document.getElementById('task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('task-id').value;
            const payload = {
                title: document.getElementById('t-title').value,
                description: document.getElementById('t-desc').value,
                deadline: document.getElementById('t-deadline').value || null,
                status: document.getElementById('task-status').value
            };

            const token = localStorage.getItem('kanban_token');
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/tasks/${id}` : `${API_URL}/tasks`;

            const res = await fetch(url, {
                method,
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                closeModal();
                await fetchTasks();
                renderBoard();
            } else {
                const data = await res.json();
                alert(data.error);
            }
        });

        async function deleteTask(id) {
            if (!confirm('Excluir esta tarefa?')) return;
            const token = localStorage.getItem('kanban_token');
            await fetch(`${API_URL}/tasks/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            await fetchTasks();
            renderBoard();
        }

        async function toggleDone(id) {
            const token = localStorage.getItem('kanban_token');
            await fetch(`${API_URL}/tasks/${id}/done`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            await fetchTasks();
            renderBoard();
        }

        // --- MODAL UTILS ---
        function openModal(status, id = null) {
            const modal = document.getElementById('task-modal');
            const form = document.getElementById('task-form');
            form.reset();
            
            document.getElementById('task-id').value = id || '';
            document.getElementById('task-status').value = status;
            document.getElementById('modal-title').innerText = id ? 'Editar Tarefa' : 'Nova Tarefa';

            if (id) {
                const task = tasks.find(t => t.id === id);
                if (task) {
                    document.getElementById('t-title').value = task.title;
                    document.getElementById('t-desc').value = task.description;
                    document.getElementById('t-deadline').value = task.deadline || '';
                }
            }

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('task-modal').style.display = 'none';
        }

        // --- DRAG & DROP ---
        function allowDrop(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('drag-over');
        }

        function dragLeave(ev) {
            ev.currentTarget.classList.remove('drag-over');
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
            ev.target.classList.add('dragging');
        }

        async function drop(ev) {
            ev.preventDefault();
            const column = ev.currentTarget;
            column.classList.remove('drag-over');
            
            const idAttr = ev.dataTransfer.getData("text");
            const taskId = idAttr.replace('task-', '');
            const newStatus = column.getAttribute('data-status');

            const card = document.getElementById(idAttr);
            card.classList.remove('dragging');

            // Update on server
            const token = localStorage.getItem('kanban_token');
            const res = await fetch(`${API_URL}/tasks/${taskId}/move`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status: newStatus })
            });

            if (res.ok) {
                await fetchTasks();
                renderBoard();
            }
        }

        // --- UTILS ---
        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        }

        function logout() {
            localStorage.removeItem('kanban_token');
            localStorage.removeItem('kanban_user');
            window.location.reload();
        }

        // Start
        window.onload = initApp;
    </script>
</body>
</html>
